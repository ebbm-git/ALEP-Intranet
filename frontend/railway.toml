[build]
builder = "NIXPACKS"
buildCommand = "npm ci"

[deploy]
# `npm start` builds Vite + serves the dist/ folder. Doing the build at start
# means any builder (Nixpacks, Railpack, raw Docker) gets a working SPA.
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
