[build]
builder = "NIXPACKS"

[deploy]
# Wrap in sh -c so $PORT (set by Railway) reliably expands even when the
# runner doesn't execute startCommand through a shell.
startCommand = "sh -c 'alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
